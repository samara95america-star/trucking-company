<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Titan Freight Logistics | Premium Trucking & Supply Chain Solutions</title>

    <!-- Primary SEO Metadata -->
    <meta name="description" content="Titan Freight Logistics provides dependable dry van, refrigerated freight, flatbed hauling, and premium dedicated logistics solutions across North America. Request an instant quote or track your shipment today." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://titanfreight.com/" />
    <meta property="og:title" content="Titan Freight Logistics | Premium Trucking & Supply Chain" />
    <meta property="og:description" content="Dependable dry van, refrigerated freight, flatbed hauling, and premium dedicated logistics solutions across North America." />

    <!-- Google Fonts for Strong Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Structured Data Schema for Local Search Optimization (LocalBusiness / Logistics) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Titan Freight Logistics",
        "description": "Safe, dependable asset-backed trucking, refrigerated cargo, and supply chain logistics solutions across 50 US states, Canada, and Mexico.",
        "url": "https://titanfreight.com/",
        "telephone": "+13125552026",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "500 Logistics Parkway",
          "addressLocality": "Chicago",
          "addressRegion": "IL",
          "postalCode": "60601",
          "addressCountry": "US"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "41.8781",
          "longitude": "-87.6298"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday"
            ],
            "opens": "07:00",
            "closes": "19:00"
          }
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+13125552026",
          "contactType": "Emergency Dispatch Desk",
          "hoursAvailable": "24/7"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
